# Vinted return/complaint policy thresholds (constitution II.2 / V.3).
#
# T090: PolicyLoader now reads return-window days and refund-amount thresholds live from the
# retailer's Drive-synced Return/Complaint Policy text (rag_documents, type='policy'). This
# file is kept as PolicyLoader's static fallback (constitution VI.3) for when that live read
# fails, and as the sole source of legal_warranty_days, which the policy text never states as
# an exact number (see PolicyLoader's Javadoc). Values here should stay in sync with the
# retailer's actual documents.
vinted:
  return_window_days_domestic: 21
  return_window_days_international: 30
  auto_refund_max_amount: 80.00
  manual_review_max_amount: 200.00
  # Legal (quality) warranty period for complaints, per spec User Story 5 edge case:
  # a complaint filed after the standard return window but within this longer period is
  # still eligible, but must escalate with an explanatory note rather than auto-resolve.
  legal_warranty_days: 730
