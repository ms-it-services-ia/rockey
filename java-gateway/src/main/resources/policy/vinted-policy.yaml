# Vinted return/complaint policy thresholds (constitution II.2 / V.3).
#
# POC stand-in for "thresholds defined in the retailer's Google Drive config": in production
# this file would be regenerated by a Drive-config-sync job reading the retailer's own
# policy documents; for the POC it's bundled directly, matching the constitution's numeric
# values. PolicyLoader is the single place this is read from — swapping the source later
# only touches that class. Tracked follow-up: specs/001-poc-agent/tasks.md T090.
vinted:
  return_window_days_domestic: 21
  return_window_days_international: 30
  auto_refund_max_amount: 80.00
  manual_review_max_amount: 200.00
