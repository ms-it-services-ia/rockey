spring:
  application:
    name: rockey-java-gateway
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rockeydb}
    username: ${SPRING_DATASOURCE_USERNAME:rockey}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mail:
    # SMTP send side of the Email channel (constitution I.4b). IMAP receive-side host/user
    # come from tenant_config per retailer; SMTP is assumed to be the same mail provider
    # (Gmail, per constitution VIII.2's example) since the constitution doesn't define a
    # separate SMTP host variable.
    host: ${VINTED_EMAIL_SMTP_HOST:smtp.gmail.com}
    port: ${VINTED_EMAIL_SMTP_PORT:587}
    username: ${VINTED_EMAIL_USER:}
    password: ${VINTED_EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

rockey:
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:changeme_internal_token}
  python-agent-url: ${PYTHON_AGENT_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health
